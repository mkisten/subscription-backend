server:
  port: ${SERVER_PORT:8084}
  servlet:
    context-path: /api

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5434/hh_parser_service}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: true
  jackson:
    time-zone: Europe/Moscow

management:
  endpoints:
    web:
      exposure:
        include: health,info

app:
  hh:
    base-url: ${HH_PUBLIC_BASE_URL:https://hh.ru}
    search-url: ${HH_SEARCH_URL:https://hh.ru/search/vacancy}
    timeout-ms: ${HH_TIMEOUT_MS:15000}
    user-agent: ${HH_USER_AGENT:Mozilla/5.0 (compatible; SubscriptionVacancyParser/1.0; +https://subscriptionhhapp.ru)}
    default-area-russia: 113
    default-area-belarus: 16
  cache:
    ttl-minutes: ${HH_CACHE_TTL_MINUTES:30}
  prefetch:
    enabled: ${HH_PREFETCH_ENABLED:true}
    fixed-delay-ms: ${HH_PREFETCH_DELAY_MS:300000}
    initial-delay-ms: ${HH_PREFETCH_INITIAL_DELAY_MS:120000}
    max-pages: ${HH_PREFETCH_MAX_PAGES:20}
    recent-request-window-minutes: ${HH_PREFETCH_ACTIVE_WINDOW_MINUTES:1440}
    request-delay-ms: ${HH_PREFETCH_REQUEST_DELAY_MS:250}

logging:
  level:
    com.mkisten.hhparserbackend: INFO
