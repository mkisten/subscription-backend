server:
  port: ${SERVER_PORT:8081}
  servlet:
    context-path: ${SERVER_SERVLET_CONTEXT_PATH:/api}

spring:
  datasource:
    url: ${SPRING_DATASOURCE_URL:jdbc:postgresql://127.0.0.1:5432/vacancy_service}
    username: ${SPRING_DATASOURCE_USERNAME:postgres}
    password: ${SPRING_DATASOURCE_PASSWORD:postgres}
    driver-class-name: org.postgresql.Driver
  jpa:
    open-in-view: false
    hibernate:
      ddl-auto: update
    show-sql: false
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect
        format_sql: false
  jackson:
    time-zone: UTC

management:
  endpoints:
    web:
      exposure:
        include: health,info

auth:
  service:
    url: ${AUTH_SERVICE_URL:https://api.subscriptionhhapp.ru}

app:
  hhru:
    base-url: ${HH_BASE_URL:http://127.0.0.1:8084/api}
    timeout: ${APP_HHRU_TIMEOUT:10000}
    requests-per-second: ${APP_HHRU_REQUESTS_PER_SECOND:10}
    max-pages: ${APP_HHRU_MAX_PAGES:20}
  auto-update:
    workers: ${APP_AUTO_UPDATE_WORKERS:1}

logging:
  level:
    com.mkisten.vacancybackend: INFO
    org.springframework.security: INFO